{% extends 'tienda/base.html' %}

{% block title %}Editar Usuario - GreenBoxd{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow border-0">
            <div class="card-body p-4">
                <h2 class="card-title text-center mb-4 fw-bold text-warning">Editar Datos de {{ usuario.username }}</h2>
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" name="first_name" class="form-control" value="{{ usuario.first_name }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Apellido</label>
                        <input type="text" name="last_name" class="form-control" value="{{ usuario.last_name }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" value="{{ usuario.email }}">
                    </div>
                    <button type="submit" class="btn btn-warning w-100 mt-2">Guardar Cambios</button>
                </form>
                <div class="text-center mt-3">
                    <a href="{% url 'lista_usuarios' %}" class="text-muted small">Cancelar y volver</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
